name: Build APK

# Baut die Release-APK auf GitHubs Runnern und stellt sie als Download bereit.
# Läuft bei jedem Push auf main sowie manuell über den Actions-Tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Java einrichten (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Flutter einrichten
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.5
          cache: true

      - name: Abhängigkeiten laden
        run: flutter pub get

      - name: Android-Projekt generieren
        run: flutter create --platforms=android --project-name genesis_kreislauf_des_lebens --org com.genesis .

      - name: Release-APK bauen
        run: flutter build apk --release

      - name: APK als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: genesis-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: APK an Release anhängen (nur bei Tag-Push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
