name: Build APK

# Baut die Release-APK auf GitHubs Runnern und stellt sie zum Download bereit.
# Läuft bei jedem Push auf main, bei Versions-Tags (v*) und manuell über den
# Actions-Tab ("Run workflow"). Die fertige APK wird auf zwei Wegen bereitgestellt:
#   1. Als Build-Artefakt (Actions-Tab → Lauf öffnen → Artifacts) – benötigt Login.
#   2. Als GitHub-Release "latest" mit permanentem, öffentlichem Download-Link.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Java einrichten (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Flutter einrichten
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.5
          cache: true

      - name: Abhängigkeiten laden
        run: flutter pub get

      - name: Android-Projekt generieren
        run: flutter create --platforms=android --project-name genesis_kreislauf_des_lebens --org com.genesis .

      - name: Release-APK bauen
        run: flutter build apk --release

      - name: APK als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: genesis-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      # ── Permanentes "latest"-Release aktualisieren (nur auf main / manuell) ──
      # Bietet einen stabilen Download-Link, der immer die neueste APK enthält:
      #   https://github.com/<owner>/<repo>/releases/latest
      - name: APK an "latest"-Release anhängen
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: GENESIS – Neueste APK
          body: |
            Automatisch gebaute Release-APK von GENESIS: Der Kreislauf des Lebens.
            Enthält den aktuellen Stand des `main`-Branches (Commit ${{ github.sha }}).

            **Installation:** APK unten unter "Assets" herunterladen, auf dem
            Android-Gerät öffnen und Installation aus unbekannten Quellen erlauben.
          # Kein Prerelease, damit die URL releases/latest auflöst und das
          # "Latest"-Badge gesetzt wird.
          prerelease: false
          make_latest: true
          files: build/app/outputs/flutter-apk/app-release.apk

      # ── Versioniertes Release bei Tag-Push (z. B. v1.0.0) ──
      - name: APK an Versions-Release anhängen (bei Tag-Push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
